<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preparando Oferta...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            /* FUNDO: Degradê Colorido Animado */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: aurora 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Partículas: Brancas suaves para destacar no colorido */
        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: float 8s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(110vh) scale(0.5); opacity: 0; }
            to { transform: translateY(-10vh) scale(1.2); opacity: 1; }
        }

        .loader-box {
            width: 90%;
            max-width: 420px;
            /* BOX: Branco Sólido com sombra colorida */
            background: #ffffff;
            border-radius: 30px;
            padding: 45px 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            animation: fadeUp 1s ease;
            z-index: 2;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 800;
            /* TÍTULO: Texto Colorido */
            background: linear-gradient(90deg, #e73c7e, #23a6d5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #4b5563;
            margin-bottom: 28px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f1f5f9;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            /* BARRA: Gradiente Arco-Íris */
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 200% 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
        }

        .percent-text {
            margin-top: 15px;
            font-size: 26px;
            font-weight: 800;
            color: #1e293b;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .link-btn {
            display: block;
            margin-top: 32px;
            padding: 18px 0;
            /* BOTÃO: Azul Profundo Moderno */
            background: #1e293b;
            color: #ffffff;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            background: #0f172a;
        }
    </style>
</head>
<body>
    <script>
        for (let i = 0; i < 25; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (4 + Math.random() * 6) + "s";
            p.style.opacity = Math.random() * 0.6;
            document.body.appendChild(p);
        }
    </script>

    <div class="loader-box">
        <div class="title">MEGA FEIRÃO</div>
        <div class="subtitle">Buscando as melhores condições...</div>

        <div class="progress-bar">
            <div id="progress" class="progress-fill"></div>
        </div>

        <div id="percent" class="percent-text">0%</div>

        <a href="https://darling-marigold-cc40f1.netlify.app/" class="link-btn">
            CONTINUAR
        </a>
    </div>

    <script>
        let percent = 0;
        const bar = document.getElementById("progress");
        const text = document.getElementById("percent");

        const loading = setInterval(() => {
            if (percent < 90) {
                percent += Math.floor(Math.random() * 3) + 1;
            } else if (percent < 100) {
                percent += 1;
            }

            if (percent > 100) percent = 100;

            bar.style.width = percent + "%";
            text.innerText = percent + "%";
                        
            if (percent >= 100) {
                clearInterval(loading);
                text.innerText = "LIBERADO!";
                text.style.color = "#10b981"; 
            }
        }, 60);
    </script>
</body>
</html>
